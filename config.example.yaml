capture:
  interval_seconds: 30
  output_dir: data/screenshots

dedup:
  phash_threshold: 8
  histogram_threshold: 0.98
  enable_histogram: true

embedding:
  enabled: false
  base_url: http://127.0.0.1:8000/v1
  model: text-embedding-3-small
  api_key: ""
  api_key_env: EMBEDDING_API_KEY
  threshold: 0.92

activity:
  merge_window_minutes: 3

vlm:
  provider: heuristic              # heuristic | openai_compatible
  base_url: http://127.0.0.1:8000/v1
  model: qwen2.5-vl-7b-instruct
  api_key: ""
  api_key_env: VLM_API_KEY
  max_retries: 2
  timeout: 120
  fallback_heuristic: true

memory:
  db_path: data/memory/events.db

proactive:
  output_dir: data/reports

web:
  host: 127.0.0.1
  port: 8765

voice:
  wake_names: ["Retina", "小光", "光光"]
  speak_feedback: true
  language: zh-CN
  stt_engine: auto              # auto | vosk(离线) | google(在线)
  vosk_model_path: models/vosk-model-small-cn-0.22
  session_mode: true             # 唤醒后免唤醒连续对话
  session_duration_seconds: 60
  ui: ball                       # ball | sidebar | none
  listen_timeout: 8
  phrase_limit: 12
  energy_threshold: 300
  apps:
    微信: WeChat
    浏览器: msedge
    Edge: msedge
    Cursor: Cursor
    终端: wt
    代码: Cursor
  urls:
    百度: https://www.baidu.com
    谷歌: https://www.google.com
    GitHub: https://github.com
    知乎: https://www.zhihu.com
